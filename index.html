<script>
    // 1. Configuration & Key Check
    const CLIENT_ID = '503269636859-16d9f6boog5ko05dj2fhc7bhpfr5cr8e.apps.googleusercontent.com'; 
    let API_KEY = localStorage.getItem('gemini_api_key');
    let accessToken = null;
    let currentImageBase64 = "";

    if (!API_KEY) {
        API_KEY = prompt("Please enter your Gemini API Key:");
        if (API_KEY) localStorage.setItem('gemini_api_key', API_KEY);
    }

    const cameraInput = document.getElementById('cameraInput');
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const preview = document.getElementById('preview');
    const saveBtn = document.getElementById('saveBtn');

    // 2. The Logic: What happens after you take the photo
    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        loader.style.display = 'block';
        resultDiv.innerText = "Processing image...";

        const reader = new FileReader();
        
        reader.onerror = () => alert("Failed to read file. Try a smaller photo.");
        
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            
            img.onload = function() {
                // RESIZING: Crucial for iPhone Safari stability
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1000; 
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Convert to compressed JPEG
                currentImageBase64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                preview.src = canvas.toDataURL('image/jpeg');
                preview.style.display = 'block';

                // Trigger Gemini
                callGemini(currentImageBase64);
            };
        };
        reader.readAsDataURL(file);
    });

    async function callGemini(base64Image) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;
        
        const payload = {
            contents: [{
                parts: [
                    { text: "Extract the Merchant Name, Date, and Total Amount from this receipt. List them clearly." },
                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                ]
            }]
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.error) {
                alert("Gemini Error: " + data.error.message);
                resultDiv.innerText = "Error: " + data.error.message;
            } else if (data.candidates && data.candidates[0]) {
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
                saveBtn.style.display = 'block';
            }
        } catch (error) {
            alert("Network Error: Check your connection.");
            resultDiv.innerText = "Connection Failed.";
        } finally {
            loader.style.display = 'none';
        }
    }

    // (Add your startSave, proceedWithSave, and b64toBlob functions back here)
</script>
