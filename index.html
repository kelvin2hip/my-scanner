<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelvin's Scanner</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        .btn { background: #007AFF; color: white; padding: 15px 30px; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; width: 100%; }
        #result { margin-top: 20px; text-align: left; white-space: pre-wrap; background: #e9e9eb; padding: 15px; border-radius: 10px; font-size: 14px; }
        .loader { color: #666; font-style: italic; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Receipt Scanner</h2>
        <input type="file" accept="image/*" capture="camera" id="cameraInput" style="display:none;">
        <button class="btn" onclick="document.getElementById('cameraInput').click()">Scan Receipt</button>
        
        <div id="loader" class="loader">Gemini is analyzing...</div>
        <img id="preview">
        <div id="result">Results will appear here.</div>
    </div>

    <script>
        // PASTE YOUR API KEY BETWEEN THE QUOTES BELOW
        const API_KEY = "AIzaSyC8QnxLrtV0R5NPDbCtTkK_xIm7937SQU0"; 

        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        cameraInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show preview and loader
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            loader.style.display = 'block';
            resultDiv.innerText = "Reading receipt...";

            // Convert image to Base64 for Gemini
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                await callGemini(base64Data);
            };
            reader.readAsDataURL(file);
        });

       async function callGemini(base64Image) {
    // UPDATED FOR APRIL 2026: Using Gemini 3 Flash
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;
    
    const payload = {
        contents: [{
            parts: [
                { text: "Extract the Merchant Name, Date, and Total Amount from this receipt. Be concise." },
                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
            ]
        }]
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.error) {
            // This will now tell us if it's STILL trying to find 1.5 or if there is a new issue
            resultDiv.innerText = "Error " + data.error.code + ": " + data.error.message;
            return;
        }

        if (data.candidates && data.candidates[0]) {
            resultDiv.innerText = data.candidates[0].content.parts[0].text;
        } else {
            resultDiv.innerText = "Connection successful, but no text was returned.";
        }

    } catch (error) {
        resultDiv.innerText = "Connection Failed: " + error.message;
    } finally {
        loader.style.display = 'none';
    }
}
    </script>
</body>
</html>
